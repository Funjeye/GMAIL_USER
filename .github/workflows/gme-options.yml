name: GME Options Snapshot

on:
  # GitHub cron runs in UTC. 13:47 UTC = 6:47 AM PDT (Summer) or 5:47 AM PST (Winter).
  # GitHub does not automatically shift for Daylight Saving Time.
  #
  # Minute is deliberately off the quarter-hour. Scheduled runs on shared runners
  # queue heavily at :00/:15/:30/:45 — at '45 13' this job started 77-108 min late
  # every day (7/15-7/21), so the email landed ~8:25 AM PT instead of ~6:45.
  # The job itself takes ~20 seconds. Do not move this back to a :00/:05/:15/:30/:45 minute.
  #
  # Floor: the run must execute AFTER the 13:30 UTC market open. Tradier's sandbox
  # feed is ~15 min delayed, so an earlier fire would email pre-open/stale quotes.
  schedule:
    - cron: '47 13 * * 1-5'
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  snapshot-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Caches dependencies to speed up daily runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run options snapshot script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          # Optional: only set this secret if using a free sandbox token
          # (value: https://sandbox.tradier.com/v1). Omit for a production token.
          TRADIER_BASE_URL: ${{ secrets.TRADIER_BASE_URL }}
        run: python options_snapshot.py

      - name: Commit and push CSV updates
        # Using git diff prevents workflow failures on the off-chance the file didn't change
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/gme_options_history.csv
          git diff --staged --quiet || git commit -m "Auto-update GME options history [skip ci]"
          # Rebase on any moved branch before pushing so a concurrent commit can't fail the push
          git pull --rebase origin main
          git push
